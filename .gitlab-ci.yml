stages:
  - test
  - release

default:
  image: node:20-alpine
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.29.2 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

test:
  stage: test
  script:
    - pnpm typecheck
    - pnpm test
    - pnpm build

# Publishes any package whose version isn't on npm yet. Run `pnpm changeset
# version` (bump + CHANGELOG) and merge it to the default branch first; this job
# then publishes. No-op when there's nothing new to release.
publish:
  stage: release
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - pnpm changeset publish
